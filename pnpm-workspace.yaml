  '@parcel/watcher': true
  '@swc/core': true
  protobufjs: true
  sharp: true
  unrs-resolver: true
minimumReleaseAgeExclude:
  - postcss@8.5.10
  - protobufjs@7.5.6
  - '@protobufjs/utf8@1.1.1'
  - ws@8.20.1
